<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>schumpeter — find work</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <header>
      <h1>schumpeter</h1>
      <p class="subtitle">Most of us just need a job.</p>
    </header>

    <section id="setup" class="panel">
      <h2>Configuration</h2>
      <div class="input-group">
        <label for="openrouter-key">OpenRouter API Key</label>
        <input type="password" id="openrouter-key" placeholder="sk-or-v1-...">
      </div>
      <div class="input-group">
        <label for="serpapi-key">SerpAPI Key (optional)</label>
        <input type="password" id="serpapi-key" placeholder="For Google search results">
      </div>
      <button id="save-keys" class="primary">Save Keys</button>
      <p class="note">Keys stored in browser session only</p>
    </section>

    <section id="upload" class="panel hidden">
      <h2>Your CV</h2>
      <div id="drop-zone" class="drop-zone">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
        </svg>
        <p>Drop your CV here or click to upload</p>
        <p class="note">PDF, DOC, DOCX, or TXT</p>
        <input type="file" id="cv-input" accept=".pdf,.doc,.docx,.txt" hidden>
      </div>
      <div id="cv-status" class="hidden"></div>
    </section>

    <section id="processing" class="panel hidden">
      <div class="spinner"></div>
      <p id="status-text">Analyzing CV...</p>
    </section>

    <section id="results" class="panel hidden">
      <h2>Opportunities</h2>
      <div id="job-list"></div>
      <button id="start-over" class="secondary">Start Over</button>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>
  <script src="app.js"></script>
</body>
</html>
