<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>schumpeter — find work</title>
  <meta name="description" content="Most of us just need a job. Upload your CV, get AI-matched job opportunities with search links.">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://1111philo.github.io/schumpeter/">
  <meta property="og:title" content="schumpeter — find work">
  <meta property="og:description" content="Most of us just need a job. Upload your CV, get AI-matched job opportunities with search links.">
  <meta property="og:image" content="https://1111philo.github.io/schumpeter/meta-og.jpg">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://1111philo.github.io/schumpeter/">
  <meta property="twitter:title" content="schumpeter — find work">
  <meta property="twitter:description" content="Most of us just need a job. Upload your CV, get AI-matched job opportunities with search links.">
  <meta property="twitter:image" content="https://1111philo.github.io/schumpeter/meta-og.jpg">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <header>
      <h1>schumpeter</h1>
      <p class="subtitle">Most of us just need a job.</p>
    </header>

    <section id="setup" class="panel">
      <h2>Configuration</h2>

      <div class="input-group">
        <label for="openrouter-key">OpenRouter API Key</label>
        <input type="password" id="openrouter-key" placeholder="sk-or-v1-...">
        <p class="note">Get free API key from <a href="https://openrouter.ai/" target="_blank">openrouter.ai</a></p>
      </div>

      <div class="input-group">
        <label for="openrouter-model">Model</label>
        <select id="openrouter-model">
          <option value="">Loading models...</option>
        </select>
        <p class="note">Free models have rate limits but cost nothing</p>
      </div>

      <button id="save-keys" class="primary">Save Keys</button>
      <p class="note">Keys stored in browser session only</p>
    </section>

    <section id="upload" class="panel hidden">
      <h2>Your CV</h2>
      <div id="drop-zone" class="drop-zone">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
        </svg>
        <p>Drop your CV here or click to upload</p>
        <p class="note">PDF, DOC, DOCX, or TXT</p>
        <input type="file" id="cv-input" accept=".pdf,.doc,.docx,.txt" hidden>
      </div>
      <div id="cv-status" class="hidden"></div>
      <button id="change-settings" class="secondary">Change Settings</button>
    </section>

    <section id="processing" class="panel hidden">
      <div class="spinner"></div>
      <p id="status-text">Analyzing CV...</p>
    </section>

    <section id="results" class="panel hidden">
      <h2>Opportunities</h2>
      <div id="job-list"></div>
      <button id="start-over" class="secondary">Start Over</button>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
